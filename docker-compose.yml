version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: monitoring-postgres
    restart: always
    environment:
      POSTGRES_DB: network_monitoring_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: monitoring-app
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/network_monitoring_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

volumes:
  postgres_data: